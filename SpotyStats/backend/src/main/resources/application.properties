spring.application.name=spotystats-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://127.0.0.1:5432/spotystats}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Schema is applied manually (see src/main/resources/db/migration/*.sql),
# so Spring Session must not try to create its own tables.
spring.session.jdbc.initialize-schema=never
spring.session.timeout=30d

spring.security.oauth2.client.registration.spotify.client-id=${SPOTIFY_CLIENT_ID}
spring.security.oauth2.client.registration.spotify.client-secret=${SPOTIFY_CLIENT_SECRET}
spring.security.oauth2.client.registration.spotify.client-name=Spotify
spring.security.oauth2.client.registration.spotify.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.spotify.client-authentication-method=client_secret_basic
spring.security.oauth2.client.registration.spotify.redirect-uri=${SPOTIFY_REDIRECT_URI}
spring.security.oauth2.client.registration.spotify.scope=user-read-email,user-read-private,user-read-recently-played,user-library-read,user-library-modify,user-follow-read,user-follow-modify,user-top-read

spring.security.oauth2.client.provider.spotify.authorization-uri=https://accounts.spotify.com/authorize
spring.security.oauth2.client.provider.spotify.token-uri=https://accounts.spotify.com/api/token
spring.security.oauth2.client.provider.spotify.user-info-uri=https://api.spotify.com/v1/me
spring.security.oauth2.client.provider.spotify.user-name-attribute=id

server.port=8080

# Actuator: expose only the health probe (the integration guide's public
# health check). This matches Spring Boot's default, made explicit so adding
# endpoints later is a deliberate decision.
management.endpoints.web.exposure.include=health

# Application-specific settings (bound by AppProperties / SpotifyProperties)
# Where the browser-facing SPA lives; used for post-login / error redirects.
app.frontend-base-uri=${FRONTEND_BASE_URI:http://127.0.0.1:5173}
# NEVER commit real values. Override via env vars in every real environment.
app.token-encryption.password=${TOKEN_ENCRYPTION_PASSWORD}
app.token-encryption.salt=${TOKEN_ENCRYPTION_SALT}

spotify.api-base-uri=https://api.spotify.com/v1

logging.level.org.springframework.security=INFO

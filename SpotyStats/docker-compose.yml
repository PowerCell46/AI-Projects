# Local development infrastructure.
# Brings up Postgres so you can run the backend natively:
#   docker compose up -d
#   cd backend && mvn spring-boot:run   (with JAVA_HOME -> JDK 25)
#
# Full-stack deployment images (backend + frontend Dockerfiles) are added later.

services:
  postgres:
    image: postgres:17
    container_name: spotystats-postgres
    environment:
      POSTGRES_DB: spotystats
      POSTGRES_USER: spotystats
      POSTGRES_PASSWORD: spotystats
    ports:
      # Host port 5433: a locally installed PostgreSQL service already owns 5432.
      - "5433:5432"
    volumes:
      - spotystats-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotystats -d spotystats"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  spotystats-pgdata:

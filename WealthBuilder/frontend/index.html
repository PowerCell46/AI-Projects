<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/wealthBuilder-favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>WealthBuilder</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Apply the stored theme before first paint so the page never flashes the wrong
         palette (and the global color transition doesn't animate on load). -->
    <script>
      (function () {
        var stored = localStorage.getItem('wealthbuilder.theme');
        document.documentElement.setAttribute(
          'data-theme',
          stored === 'light' || stored === 'dark' ? stored : 'dark'
        );
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

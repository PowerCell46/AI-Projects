# SPA server for the frontend container. It only serves static files; the /api routes
# never reach here — the edge proxy forwards those straight to the backend.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Client-side routing: unknown paths fall back to index.html so deep links work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed filenames under /assets, so they can be cached forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the entrypoint, so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}

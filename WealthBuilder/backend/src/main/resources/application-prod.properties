# Production-profile overrides — active when SPRING_PROFILES_ACTIVE=prod (set in docker-compose.yml).
# Any value here silently overrides the matching key in application.properties.

# The auth cookie must carry the Secure flag on any HTTPS deployment so it is never sent over
# plain HTTP. The base default is false (for http local dev); prod unconditionally forces true.
app.auth.cookie-secure=true

# Never modify the schema automatically in production. 'validate' confirms that the DB schema
# matches the JPA entities and fails fast on any drift — without dropping or altering data.
# On a fresh database you will need DDL_AUTO=create or DDL_AUTO=update (set in the .env) for
# the first boot; once the schema is established, remove that override.
spring.jpa.hibernate.ddl-auto=validate

spring.application.name=wealthbuilder-backend

spring.datasource.url=${POSTGRE_SQL_URL:jdbc:postgresql://127.0.0.1:5432/wealth_builder_db}
spring.datasource.username=${POSTGRE_SQL_USERNAME:__PLACEHOLDER__}
spring.datasource.password=${POSTGRE_SQL_PASSWORD:__PLACEHOLDER__}

# Hibernate manages the schema directly (single-app, no external migrations yet).
spring.jpa.hibernate.ddl-auto=create
#spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.port=8080

# Pagination: cap the client-supplied `size` so a request like `?size=2000000` can't
# force a huge page into memory. `@PageableDefault` still sets the per-endpoint default.
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Actuator: expose only the health probe; broaden deliberately if needed later.
management.endpoints.web.exposure.include=health

# --- Application settings (bound by AppProperties) ---
# Browser-facing SPA origin patterns allowed by CORS (comma-separated). `[*]` matches any
# port, so the Vite dev server works on localhost or 127.0.0.1 whatever port it picks.
# In production, set FRONTEND_BASE_URIS to the exact deployed origin(s).
app.frontend-base-uris=${FRONTEND_BASE_URIS:http://localhost:[*],http://127.0.0.1:[*]}

# JWT signing — no built-in default on purpose: with no public fallback secret there is
# nothing insecure that could leak into a real deployment. JWT_SECRET (>= 32 bytes for
# HS256) and JWT_TTL (ISO-8601 duration, e.g. PT2H) MUST be supplied via env, or the
# placeholder stays unresolved and the app refuses to start.
app.jwt.secret=${JWT_SECRET}
app.jwt.ttl=${JWT_TTL}

# Auth cookie: the JWT is delivered in an httpOnly cookie (not JS-readable, unlike a body token
# in localStorage) and read from that cookie on each request. SameSite=Lax is the CSRF defense —
# the browser won't attach the cookie to cross-site POST/PUT/DELETE or to cross-site fetch/XHR, so
# a forged request can't act as the user. Set AUTH_COOKIE_SECURE=true on any https deployment.
app.auth.cookie-name=${AUTH_COOKIE_NAME:wb_token}
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
app.auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}

# Moderator seeded at startup only if no MODERATOR exists yet.
# Leave the password blank to skip seeding (e.g. in CI).
app.moderator.username=${APP_MODERATOR_USERNAME:__PLACEHOLDER__}
app.moderator.password=${APP_MODERATOR_PASSWORD:__PLACEHOLDER__}

# Our code logs business events at INFO. Flip to DEBUG to also see token issuance,
# per-request user loads, and rejected-token reasons.
logging.level.com.wealthbuilder.backend=INFO
logging.level.org.springframework.security=INFO

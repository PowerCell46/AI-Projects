# Edge reverse proxy: terminates TLS and is the single public entrypoint.
#   /api/  -> backend  (the ONLY route that reaches the backend)
#   /      -> frontend (the static SPA)
# The backend and frontend containers publish no host ports; only this proxy can reach
# them, over the internal Docker networks.

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # CSP: all resources from same origin; inline styles allowed (React's style={{}} props emit
    # inline style attributes); blob: URIs for asset images (useAssetImage creates object URLs via
    # URL.createObjectURL); data: URIs allowed as a fallback; no plugins or framing.
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Allow asset image uploads / multipart bodies up to 10 MB.
    client_max_body_size 10m;

    # API traffic -> backend. The /api prefix is preserved (the controllers map under /api).
    location /api/ {
        proxy_pass http://backend:8080;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    # Everything else -> the SPA served by the frontend container.
    location / {
        proxy_pass http://frontend:8080;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

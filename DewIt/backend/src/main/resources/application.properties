spring.application.name=dewit-backend
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/dew_it_db
spring.datasource.username=${POSTGRES_USER:__placeholder__}
spring.datasource.password=${POSTGRES_PASSWORD:__placeholder__}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

spring.jackson.serialization.write-dates-as-timestamps=false
